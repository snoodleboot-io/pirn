name: Build CI Base Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.ci'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build pirn-ci-base:py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: Dockerfile.ci
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/pirn-ci-base:py${{ matrix.python-version }}
            ${{ env.REGISTRY }}/pirn-ci-base:py${{ matrix.python-version }}-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/pirn-ci-base:cache-py${{ matrix.python-version }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/pirn-ci-base:cache-py${{ matrix.python-version }},mode=max
