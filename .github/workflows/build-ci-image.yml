name: Build CI Base Images

# Rebuilds the per-package CI images when a package's deps or the Dockerfiles
# change (push to main), refreshes them weekly, and on demand. PRs consume the
# existing images (and install any dep-delta at job time), so image builds are
# intentionally NOT triggered per-PR (36-image build is expensive).
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.ci'
      - 'Dockerfile.ci-heavy'
      - 'packages/*/pyproject.toml'
      - '.github/workflows/build-ci-image.yml'
  schedule:
    - cron: '0 6 * * 1'   # weekly Mon 06:00 UTC — refresh base/third-party deps
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # Plain base (no package baked) — used by orchestration / cross-package jobs.
  build-base:
    name: Build pirn-ci-base:py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx  # wso
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: Dockerfile.ci
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/pirn-ci-base:py${{ matrix.python-version }}
            ${{ env.REGISTRY }}/pirn-ci-base:py${{ matrix.python-version }}-${{ github.sha }}
          cache-from: type=gha,scope=base-py${{ matrix.python-version }}
          cache-to: type=gha,scope=base-py${{ matrix.python-version }},mode=max

  # Per-package images — each bakes that package's deps + extras (minus heavy ML)
  # so its lint/test matrix installs in milliseconds. 7 packages × 4 Python = 28.
  build-packages:
    name: Build pirn-ci-${{ matrix.package }}:py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: [pirn-core, pirn-signal, pirn-data, pirn-ml, pirn-agents, pirn-health, pirn-oilgas]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: Dockerfile.ci
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
            PACKAGE=${{ matrix.package }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/pirn-ci-${{ matrix.package }}:py${{ matrix.python-version }}
            ${{ env.REGISTRY }}/pirn-ci-${{ matrix.package }}:py${{ matrix.python-version }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.package }}-py${{ matrix.python-version }}
          cache-to: type=gha,scope=${{ matrix.package }}-py${{ matrix.python-version }},mode=max

  build-heavy:
    name: Build pirn-ci-heavy:py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [build-base]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx  # wso
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: Dockerfile.ci-heavy
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
            REGISTRY=${{ env.REGISTRY }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/pirn-ci-heavy:py${{ matrix.python-version }}
            ${{ env.REGISTRY }}/pirn-ci-heavy:py${{ matrix.python-version }}-${{ github.sha }}
          cache-from: type=gha,scope=heavy-py${{ matrix.python-version }}
          cache-to: type=gha,scope=heavy-py${{ matrix.python-version }},mode=max
