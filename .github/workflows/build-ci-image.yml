name: Build CI Base Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.ci'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build pirn-ci-base:py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ secrets.GHCR_APP_ID }}
          private-key: ${{ secrets.GHCR_APP_PRIVATE_KEY }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ steps.app-token.outputs.app-slug }}
          password: ${{ steps.app-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile.ci
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/pirn-ci-base:py${{ matrix.python-version }}
            ${{ env.REGISTRY }}/pirn-ci-base:py${{ matrix.python-version }}-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/pirn-ci-base:cache-py${{ matrix.python-version }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/pirn-ci-base:cache-py${{ matrix.python-version }},mode=max
