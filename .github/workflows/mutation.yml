name: Mutation Testing  # SCD-26 (per-package)

# Per-package mutation testing for the uv workspace. Each package mutates its
# OWN source tree (packages/pirn-<x>/pirn_<x>) and runs its OWN tests
# (packages/pirn-<x>/tests) — the monolith's single `pirn/` + `tests/unit`
# target is replaced by a package matrix (SCD-26).
#
# PR-scoped (mutate only each package's changed files) + nightly full run.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'   # nightly full mutation run
  workflow_dispatch:
    inputs:
      packages:
        description: 'JSON array of packages to mutate (blank = all seven)'
        required: false
        default: ''

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  ALL_PACKAGES: '["pirn-core","pirn-signal","pirn-data","pirn-ml","pirn-agents","pirn-health","pirn-oilgas"]'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve the package matrix (manual override or all seven).
  # ─────────────────────────────────────────────────────────────────────────
  matrix:
    name: Resolve package matrix
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          input='${{ github.event.inputs.packages }}'
          if [ -n "$input" ]; then echo "packages=$input" >> "$GITHUB_OUTPUT";
          else echo "packages=${ALL_PACKAGES}" >> "$GITHUB_OUTPUT"; fi

  # ─────────────────────────────────────────────────────────────────────────
  # PR-SCOPED: per package, mutate only that package's source files changed in
  # this PR, run that package's tests. Fast PR feedback.
  # ─────────────────────────────────────────────────────────────────────────
  mutation-pr:
    name: Mutation — Changed Files (${{ matrix.package }})
    needs: matrix
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true   # report regressions, never block merge (until a baseline is set)
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Resolve import dir
        id: pkg
        run: echo "imp=$(p='${{ matrix.package }}'; echo ${p/pirn-/pirn_})" >> "$GITHUB_OUTPUT"
      - name: Build wheelhouse + install ${{ matrix.package }} (editable + extras)
        run: |
          set -euo pipefail
          for p in pirn-core pirn-signal pirn-data pirn-ml pirn-agents pirn-health pirn-oilgas; do uv build "packages/$p" -o dist/; done
          extras=$(python3 -c "import tomllib;d=tomllib.load(open('packages/${{ matrix.package }}/pyproject.toml','rb'));print(','.join(k for k in d.get('project',{}).get('optional-dependencies',{}) if k not in {'pytorch','tensorflow','tflite'}))")
          spec="packages/${{ matrix.package }}"; [ -n "$extras" ] && spec="packages/${{ matrix.package }}[$extras]"
          uv venv .venv
          uv pip install --find-links dist/ -e "$spec" pytest pytest-asyncio pytest-timeout mutmut
      - name: Identify changed source files in this package
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" \
            | grep "^packages/${{ matrix.package }}/${{ steps.pkg.outputs.imp }}/.*\.py$" \
            | grep -v '__init__\.py' | tr '\n' ',' | sed 's/,$//')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed ${{ matrix.package }} files: ${FILES:-<none>}"
      - name: Run mutmut on changed files
        if: steps.changed.outputs.files != ''
        run: |
          uv run --no-sync mutmut run \
            --paths-to-mutate "${{ steps.changed.outputs.files }}" \
            --runner "python -m pytest packages/${{ matrix.package }}/tests -c packages/${{ matrix.package }}/pyproject.toml -x -q --no-header --timeout=30" \
            --no-progress || true
      - name: Report
        if: steps.changed.outputs.files != ''
        run: |
          uv run --no-sync mutmut junitxml > mutation-${{ matrix.package }}-pr.xml || true
          { echo "## Mutation — ${{ matrix.package }} (changed files)"; echo;
            uv run --no-sync mutmut results 2>&1 || echo "(no results)"; } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: steps.changed.outputs.files != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mutation-${{ matrix.package }}-pr-${{ github.sha }}
          path: mutation-${{ matrix.package }}-pr.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # NIGHTLY: per package, full mutation run over the whole package source.
  # ─────────────────────────────────────────────────────────────────────────
  mutation-nightly:
    name: Mutation — Full (${{ matrix.package }})
    needs: matrix
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Resolve import dir
        id: pkg
        run: echo "imp=$(p='${{ matrix.package }}'; echo ${p/pirn-/pirn_})" >> "$GITHUB_OUTPUT"
      - name: Build wheelhouse + install ${{ matrix.package }} (editable + extras)
        run: |
          set -euo pipefail
          for p in pirn-core pirn-signal pirn-data pirn-ml pirn-agents pirn-health pirn-oilgas; do uv build "packages/$p" -o dist/; done
          extras=$(python3 -c "import tomllib;d=tomllib.load(open('packages/${{ matrix.package }}/pyproject.toml','rb'));print(','.join(k for k in d.get('project',{}).get('optional-dependencies',{}) if k not in {'pytorch','tensorflow','tflite'}))")
          spec="packages/${{ matrix.package }}"; [ -n "$extras" ] && spec="packages/${{ matrix.package }}[$extras]"
          uv venv .venv
          uv pip install --find-links dist/ -e "$spec" pytest pytest-asyncio pytest-timeout mutmut
      - name: Run mutmut (full package)
        run: |
          uv run --no-sync mutmut run \
            --paths-to-mutate "packages/${{ matrix.package }}/${{ steps.pkg.outputs.imp }}/" \
            --runner "python -m pytest packages/${{ matrix.package }}/tests -c packages/${{ matrix.package }}/pyproject.toml -x -q --no-header --timeout=30" \
            --no-progress || true
      - name: Report + kill rate
        run: |
          uv run --no-sync mutmut junitxml > mutation-${{ matrix.package }}-nightly.xml || true
          RESULTS=$(uv run mutmut results 2>&1 || true)
          KILLED=$(echo "$RESULTS" | grep -oP 'Killed:\s*\K[0-9]+' | head -1 || echo "0")
          SURVIVED=$(echo "$RESULTS" | grep -oP 'Survived:\s*\K[0-9]+' | head -1 || echo "0")
          TOTAL=$(( KILLED + SURVIVED ))
          { echo "## Nightly Mutation — ${{ matrix.package }}"; echo;
            echo "**Date:** $(date -u +'%Y-%m-%d %H:%M UTC')"; echo;
            if [ "$TOTAL" -gt 0 ]; then echo "**Kill rate: $(( KILLED * 100 / TOTAL ))% (${KILLED}/${TOTAL})**";
            else echo "(no mutation data)"; fi; } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mutation-${{ matrix.package }}-nightly-${{ github.run_id }}
          path: mutation-${{ matrix.package }}-nightly.xml
          retention-days: 30
