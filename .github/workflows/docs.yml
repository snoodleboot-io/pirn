name: Deploy Docs

# CI/CD auto-triggers are FROZEN during the split-core-and-domains migration
# (#51). The whole pipeline gets rebuilt for the uv workspace — per-package
# gating + dependency-ordered release trains — once all domains are extracted.
# Until then every workflow is manual-only; re-enable triggers at the very end.
# See planning/current/split-core-and-domains/.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --package pirn-core --extra docs

      - name: Build docs
        run: uv run mkdocs build
        env:
          DISABLE_MKDOCS_2_WARNING: "true"

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
        id: deployment
