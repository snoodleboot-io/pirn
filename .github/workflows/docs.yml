name: Deploy Docs

# Builds + deploys the unified docs site on push to main; on demand otherwise.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Build wheelhouse + install all packages + docs deps
        run: |
          set -euo pipefail
          for p in pirn-core pirn-signal pirn-data pirn-ml pirn-agents pirn-health pirn-oilgas; do uv build "packages/$p" -o dist/; done
          uv venv .venv
          uv pip install --find-links dist/ "pirn-core[docs]" \
            pirn-signal pirn-data pirn-ml pirn-agents pirn-health pirn-oilgas

      - name: Build docs
        run: uv run --no-sync mkdocs build
        env:
          DISABLE_MKDOCS_2_WARNING: "true"

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
        id: deployment
