name: Heavy Tests

# CI/CD auto-triggers are FROZEN during the split-core-and-domains migration
# (#51). The whole pipeline gets rebuilt for the uv workspace — per-package
# gating + dependency-ordered release trains — once all domains are extracted.
# Until then every workflow is manual-only; re-enable triggers at the very end.
# See planning/current/split-core-and-domains/.
on:
  workflow_dispatch:

concurrency:
  group: heavy-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  UV_PYTHON_PREFERENCE: only-system

jobs:
  approve:
    name: Approve Heavy Tests
    runs-on: ubuntu-latest
    environment: heavy
    steps:
      - run: echo "Approved — running heavy tests across all Python versions"

  heavy-tests:
    name: Heavy Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [approve]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-heavy:py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build wheelhouse + install core & ml (+ heavy ML deps)
        run: |
          set -euo pipefail
          for p in pirn-core pirn-data pirn-ml; do uv build "packages/$p" -o dist/; done
          uv venv .venv
          uv pip install --find-links dist/ -e packages/pirn-core -e packages/pirn-ml \
            torch tensorflow pytest pytest-timeout anyio || \
          uv pip install --find-links dist/ -e packages/pirn-core -e packages/pirn-ml \
            torch pytest pytest-timeout anyio

      - name: Run heavy tests (core + ml, marked heavy)
        run: |
          mkdir -p test-results
          for pkg in pirn-core pirn-ml; do
            uv run --no-sync python -m pytest "packages/$pkg/tests" \
              -c "packages/$pkg/pyproject.toml" --rootdir "packages/$pkg" \
              -m heavy \
              --junitxml="test-results/heavy-$pkg-${{ matrix.python-version }}.xml" \
              --timeout=120 -v
          done

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-heavy-${{ matrix.python-version }}
          path: test-results/heavy-${{ matrix.python-version }}.xml
          retention-days: 30
