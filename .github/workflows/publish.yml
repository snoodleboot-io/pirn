name: Publish workspace (N wheels)  # SCD-28

# Lockstep build + publish of every workspace package (split-core-and-domains,
# Phase 5 / SCD-28, ADR-6). One version is derived, stamped across all packages
# (SCD-27), built into N wheels, published to TestPyPI on PR / PyPI on main via
# PyPI Trusted Publishing (OIDC), and then VERIFIED by installing each wheel
# *from the index* (not the local build) and asserting it imports and that
# `tapestry-check` runs — the registry-parity-from-PyPI proof.
#
# LIVE: PR → TestPyPI dry-run, merge to main → PyPI release. All 7 `pirn-*`
# projects exist on TestPyPI + PyPI with Trusted Publishers (this repo + this
# workflow + the `testpypi`/`pypi` Environments).
#
# ⚠ P5-B (irreversible, outward-facing): every real PyPI push is human-gated by
#   the `pypi` Environment (required reviewer, protected-branches only) — the
#   deployment pauses for approval before any upload.
on:
  # TestPyPI dry-run on every PR to main (OIDC trusted publishing).
  pull_request:
    branches: [main]
  # Real PyPI release on merge to main — each package publishes via OIDC and is
  # human-gated by the `pypi` Environment (required reviewer, protected-branches
  # only). calculate_version.py derives the next version from pirn-core's PyPI
  # history and stamps all packages in lockstep.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Lockstep anchor: the version is derived from pirn-core's PyPI history and
  # stamped onto every package (SCD-27).
  ANCHOR_PACKAGE: pirn-core
  MAJOR_VERSION: "0"
  WHEEL_PACKAGES: '["pirn-core","pirn-signal","pirn-data","pirn-ml","pirn-agents","pirn-health","pirn-oilgas"]'

jobs:
  # ---------------------------------------------------------------------------
  # Derive the single lockstep version, stamp all packages, build N wheels.
  # ---------------------------------------------------------------------------
  build:
    name: Stamp + build N wheels
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish_testpypi: ${{ steps.version.outputs.should_publish_testpypi }}
      should_publish_pypi: ${{ steps.version.outputs.should_publish_pypi }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Derive lockstep version (from the anchor's PyPI history)
        id: version
        run: python .github/scripts/calculate_version.py
        env:
          PACKAGE_NAME: ${{ env.ANCHOR_PACKAGE }}
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
      - name: Stamp the lockstep version across all packages (SCD-27)
        run: |
          python scripts/stamp_workspace_version.py --version "${{ steps.version.outputs.version }}"
          python scripts/stamp_workspace_version.py --check
      - name: Build all wheels + sdists (per package, no workspace)
        run: |
          set -euo pipefail
          for p in pirn-core pirn-signal pirn-data pirn-ml pirn-agents pirn-health pirn-oilgas; do
            uv build "packages/$p" -o dist/
          done
      - name: List built distributions
        run: ls -1 dist/
      - name: Upload wheelhouse
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheelhouse-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI (PR) — ONE job per package. PyPI trusted-publishing mints
  # a PROJECT-SCOPED token per OIDC exchange, so each package must publish only
  # its own distributions in its own job (a single all-7 upload 403s).
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish ${{ matrix.package }} → TestPyPI
    needs: build
    if: needs.build.outputs.should_publish_testpypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: [pirn-core, pirn-signal, pirn-data, pirn-ml, pirn-agents, pirn-health, pirn-oilgas]
    steps:
      - name: Download wheelhouse
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: wheelhouse-${{ needs.build.outputs.version }}
          path: dist/
      - name: Isolate ${{ matrix.package }} distributions
        run: |
          set -euo pipefail
          fn=$(echo "${{ matrix.package }}" | tr - _)
          mkdir -p pkgdist
          mv dist/${fn}-* pkgdist/
          ls -1 pkgdist
      - name: Publish ${{ matrix.package }} to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: pkgdist

  # ---------------------------------------------------------------------------
  # Publish to PyPI (main) — ONE job per package (project-scoped tokens, as
  # above), gated on the `pypi` Environment which MUST require a human reviewer
  # (P5-B). Irreversible.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish ${{ matrix.package }} → PyPI (human-gated)
    needs: build
    if: needs.build.outputs.should_publish_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: [pirn-core, pirn-signal, pirn-data, pirn-ml, pirn-agents, pirn-health, pirn-oilgas]
    steps:
      - name: Download wheelhouse
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: wheelhouse-${{ needs.build.outputs.version }}
          path: dist/
      - name: Isolate ${{ matrix.package }} distributions
        run: |
          set -euo pipefail
          fn=$(echo "${{ matrix.package }}" | tr - _)
          mkdir -p pkgdist
          mv dist/${fn}-* pkgdist/
          ls -1 pkgdist
      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: pkgdist

  # ---------------------------------------------------------------------------
  # Verify each package FROM THE INDEX (not the local build): install in a clean
  # venv, import, and run `tapestry-check`. Registry-parity-from-PyPI (SCD-28 AC).
  # ---------------------------------------------------------------------------
  verify:
    name: Verify ${{ matrix.package }} from index
    needs: [build, publish-testpypi]
    if: needs.build.outputs.should_publish_testpypi == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON('["pirn-core","pirn-signal","pirn-data","pirn-ml","pirn-agents","pirn-health","pirn-oilgas"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      - name: Install ${{ matrix.package }}==${{ needs.build.outputs.version }} from TestPyPI
        run: |
          set -euo pipefail
          uv venv /tmp/verify
          # TestPyPI for the pirn-* wheels; PyPI as the extra index for third-party
          # deps. --prerelease=allow because dry-run versions are dev pre-releases
          # (e.g. 0.0.N.devM) that uv otherwise won't resolve.
          # --index-strategy unsafe-best-match: the pirn-* dev version only exists
          # on TestPyPI, but PyPI also carries older pirn-* releases. Under uv's
          # default first-index strategy uv locks onto PyPI (the first index with
          # any version of the package) and never considers the requested dev
          # version on TestPyPI, failing resolution. unsafe-best-match makes uv
          # weigh the pinned version across both indexes so the TestPyPI dev
          # release resolves while third-party deps still come from PyPI.
          # Retry to ride out TestPyPI simple-index propagation lag after publish.
          for attempt in 1 2 3 4 5 6; do
            # --refresh: don't reuse uv's cached (possibly stale, pre-propagation)
            # index response between retries.
            if uv pip install --python /tmp/verify/bin/python --prerelease=allow --refresh \
                 --index-strategy unsafe-best-match \
                 --index-url https://test.pypi.org/simple/ \
                 --extra-index-url https://pypi.org/simple/ \
                 "${{ matrix.package }}==${{ needs.build.outputs.version }}"; then
              echo "installed on attempt $attempt"; break
            fi
            if [ "$attempt" = 6 ]; then echo "::error::not resolvable after retries"; exit 1; fi
            echo "attempt $attempt failed (index propagating?), sleeping 30s..."; sleep 30
          done
      - name: Import + dependency-tree closure + tapestry-check
        run: |
          set -euo pipefail
          p='${{ matrix.package }}'
          if [ "$p" = "pirn-core" ]; then imp=pirn; else imp="${p/pirn-/pirn_}"; fi
          /tmp/verify/bin/python scripts/check_install_isolation.py --package "$p"
          /tmp/verify/bin/python -c "import $imp; print('import OK:', '$imp')"
          /tmp/verify/bin/tapestry-check --help
