name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'bug/**'
      - 'bugfix/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'security/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: pirn
  PYTHON_MIN_VERSION: "3.11"
  MAJOR_VERSION: "0"
  IS_MAIN: ${{ github.ref == 'refs/heads/main' }}

# =============================================================================
# PHASE 1: TEST
# =============================================================================
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: |
          uv run python -m pytest tests/unit \
            --cov=pirn \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results/unit-${{ matrix.python-version }}.xml \
            --timeout=30 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.python-version }}
          path: |
            test-results/unit-${{ matrix.python-version }}.xml
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  mock-integration-tests:
    name: Integration Tests (mock backends)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mock integration tests
        # --real is NOT passed: real-backend tests skip automatically
        run: |
          uv run python -m pytest tests/integration \
            --junitxml=test-results/integration-mock.xml \
            --timeout=60 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration-mock
          path: test-results/integration-mock.xml
          retention-days: 30

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run smoke tests
        run: |
          uv run python -m pytest tests/smoke \
            --junitxml=test-results/smoke.xml \
            --timeout=30 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-smoke
          path: test-results/smoke.xml
          retention-days: 30

  end-to-end-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run end-to-end tests
        run: |
          uv run python -m pytest tests/end_to_end \
            --junitxml=test-results/e2e.xml \
            --timeout=120 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-e2e
          path: test-results/e2e.xml
          retention-days: 30

  perf-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run benchmarks
        run: |
          uv run python -m pytest tests/perf \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-compare-fail=mean:10% \
            --timeout=120 \
            -v

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

# =============================================================================
# PHASE 2: BUILD
# =============================================================================

  build-feature:
    name: Build (Feature Branch)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, mock-integration-tests, smoke-tests]
    # Feature branch pushes only — not main, not PRs
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Calculate version
        id: version
        run: python .github/scripts/calculate_version.py
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_ACTION: ${{ github.event.action || '' }}

      - name: Stamp version in pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep "^version = " pyproject.toml

      - name: Build package
        run: uv build

      - name: Verify installability
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          pip install dist/*.whl
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'ok')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-feature
          path: dist/
          retention-days: 1

  build-release:
    name: Build (Release)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, mock-integration-tests, smoke-tests, end-to-end-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish_testpypi: ${{ steps.version.outputs.should_publish_testpypi }}
      should_publish_pypi: ${{ steps.version.outputs.should_publish_pypi }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Calculate version
        id: version
        run: python .github/scripts/calculate_version.py
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_ACTION: ${{ github.event.action || '' }}

      - name: Stamp version in pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep "^version = " pyproject.toml

      - name: Build package
        run: uv build

      - name: Verify installability
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          pip install dist/*.whl
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'ok')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

# =============================================================================
# PHASE 3: PUBLISH
# =============================================================================

  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: [build-release]
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.build-release.outputs.should_publish_testpypi == 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ env.PACKAGE_NAME }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: [build-release]
    if: >
      needs.build-release.outputs.should_publish_pypi == 'true' &&
      (
        (github.event_name == 'pull_request' &&
         github.event.action == 'closed' &&
         github.event.pull_request.merged == true) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.PACKAGE_NAME }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: false

# =============================================================================
# PHASE 4: VERIFY PUBLISH
# =============================================================================

  verify-testpypi:
    name: Verify TestPyPI
    runs-on: ubuntu-latest
    needs: [publish-testpypi, build-release]
    if: github.event_name == 'pull_request'
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for index propagation
        run: sleep 60

      - name: Install from TestPyPI and verify
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          for i in 1 2 3; do
            echo "Attempt $i..."
            if pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "${{ env.PACKAGE_NAME }}==${{ needs.build-release.outputs.version }}"; then
              break
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'installed from TestPyPI')"

  verify-pypi:
    name: Verify PyPI
    runs-on: ubuntu-latest
    needs: [publish-pypi, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for index propagation
        run: sleep 60

      - name: Install from PyPI and verify
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          for i in 1 2 3; do
            echo "Attempt $i..."
            if pip install "${{ env.PACKAGE_NAME }}==${{ needs.build-release.outputs.version }}"; then
              break
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'installed from PyPI')"

# =============================================================================
# SUMMARY
# =============================================================================

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, mock-integration-tests, smoke-tests, end-to-end-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          pattern: test-results-*

      - name: Summarize
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in test-results/**/*.xml; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .xml)
            tests=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1 || echo "0")
            failures=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1 || echo "0")
            errors=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1 || echo "0")
            if [ "$failures" = "0" ] && [ "$errors" = "0" ]; then
              echo "- ✅ $name: $tests passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $name: $tests tests, $failures failures, $errors errors" >> $GITHUB_STEP_SUMMARY
            fi
          done
