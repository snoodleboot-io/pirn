name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'bug/**'
      - 'bugfix/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'security/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  PACKAGE_NAME: pirn
  PYTHON_MIN_VERSION: "3.11"
  MAJOR_VERSION: "0"
  IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
  CI_REGISTRY: ghcr.io/${{ github.repository_owner }}
  # Pre-built venv location baked into every CI image
  UV_PROJECT_ENVIRONMENT: /opt/pirn-deps/.venv
  UV_PYTHON_PREFERENCE: only-system
  UV_FROZEN: "1"

# =============================================================================
# PHASE 1: LINT (fast gate — must pass before anything else runs)
# =============================================================================
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

# =============================================================================
# PHASE 2: TEST (runs only after lint passes)
# =============================================================================

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn
        run: uv sync --all-extras

      - name: Run unit tests
        run: |
          uv run python -m pytest tests/unit \
            --cov=pirn \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results/unit-${{ matrix.python-version }}.xml \
            --timeout=30 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-unit-${{ matrix.python-version }}
          path: |
            test-results/unit-${{ matrix.python-version }}.xml
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate SBOM
        if: matrix.python-version == '3.12'
        run: uv run cyclonedx-py environment --sv 1.5 -o sbom.json

      - name: Upload SBOM artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          if-no-files-found: error

  domain-extras-matrix:
    name: Domain Extras Install (${{ matrix.extra }})
    runs-on: ubuntu-latest
    needs: [unit-tests]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    strategy:
      fail-fast: false
      matrix:
        extra:
          - data
          - agents
          - ml
          - health
          - signal
          - oilgas
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn with only this extra
        run: |
          uv venv
          uv pip install -e ".[${{ matrix.extra }}]"

      - name: Import the domain (must succeed)
        run: |
          uv run python -c "
          import pirn.domains
          mod = __import__('pirn.domains.${{ matrix.extra }}')
          print('OK: pirn.domains.${{ matrix.extra }} imports cleanly with only [${{ matrix.extra }}] installed')
          "

      - name: Always-clean domains import without cross-coupling
        run: |
          uv run python -c "
          import pirn.domains
          import pirn.domains.agents
          import pirn.domains.connectors
          print('OK: namespace + agents + connectors import without their own extras')
          "

  connector-extras-matrix:
    name: Connector Extras Install (${{ matrix.extra }})
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        extra:
          - postgres
          - sqlite
          - duckdb
          - mysql
          - bigquery
          - snowflake
          - clickhouse
          - mssql
          - oracle
          - s3
          - gcs
          - azure
          - kafka
          - kinesis
          - pubsub
          - rabbitmq
          - azure-servicebus
          - salesforce
          - hubspot
          - stripe
          - github
          - jira
          - shopify
          - datadog
          - prometheus
          - otel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install pirn with only this connector extra
        run: |
          uv venv
          uv pip install -e ".[${{ matrix.extra }}]"

      - name: Connectors namespace imports
        run: |
          uv run python -c "
          import pirn.domains.connectors
          print('OK: pirn.domains.connectors imports with only [${{ matrix.extra }}] installed')
          "

  mock-integration-tests:
    name: Integration Tests (mock backends)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn
        run: uv sync --all-extras

      - name: Run mock integration tests
        run: |
          uv run python -m pytest tests/integration \
            --ignore=tests/integration/test_dask_real.py \
            --ignore=tests/integration/test_ray_real.py \
            --junitxml=test-results/integration-mock.xml \
            --timeout=60 \
            -v

      - name: Run Dask / Ray integration tests
        continue-on-error: true
        run: |
          uv run python -m pytest tests/integration/test_dask_real.py tests/integration/test_ray_real.py \
            --junitxml=test-results/integration-dask-ray.xml \
            --timeout=300 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-integration-mock
          path: test-results/integration-mock.xml
          retention-days: 30

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn
        run: uv sync --all-extras

      - name: Run smoke tests
        run: |
          uv run python -m pytest tests/smoke \
            --junitxml=test-results/smoke.xml \
            --timeout=30 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-smoke
          path: test-results/smoke.xml
          retention-days: 30

  end-to-end-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn
        run: uv sync --all-extras

      - name: Run end-to-end tests
        run: |
          uv run python -m pytest tests/end_to_end \
            --junitxml=test-results/e2e.xml \
            --timeout=120 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-e2e
          path: test-results/e2e.xml
          retention-days: 30

  perf-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run benchmarks
        run: |
          uv run python -m pytest tests/perf \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --timeout=120 \
            -v

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

# =============================================================================
# PHASE 3: BUILD
# =============================================================================

  build-feature:
    name: Build (Feature Branch)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, domain-extras-matrix, connector-extras-matrix, mock-integration-tests, smoke-tests]
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Calculate version
        id: version
        run: python .github/scripts/calculate_version.py
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_ACTION: ${{ github.event.action || '' }}

      - name: Stamp version in pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep "^version = " pyproject.toml

      - name: Build package
        run: uv build

      - name: Verify installability
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          pip install dist/*.whl
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'ok')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-feature
          path: dist/
          retention-days: 1

  build-release:
    name: Build (Release)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, domain-extras-matrix, connector-extras-matrix, mock-integration-tests, smoke-tests, end-to-end-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish_testpypi: ${{ steps.version.outputs.should_publish_testpypi }}
      should_publish_pypi: ${{ steps.version.outputs.should_publish_pypi }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Calculate version
        id: version
        run: python .github/scripts/calculate_version.py
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_ACTION: ${{ github.event.action || '' }}

      - name: Stamp version in pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep "^version = " pyproject.toml

      - name: Build package
        run: uv build

      - name: Verify installability
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          pip install dist/*.whl
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'ok')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

# =============================================================================
# PHASE 4: PUBLISH
# =============================================================================

  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: [build-release]
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.build-release.outputs.should_publish_testpypi == 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ env.PACKAGE_NAME }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: [build-release]
    if: >
      needs.build-release.outputs.should_publish_pypi == 'true' &&
      (
        (github.event_name == 'pull_request' &&
         github.event.action == 'closed' &&
         github.event.pull_request.merged == true) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.PACKAGE_NAME }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          skip-existing: false

# =============================================================================
# PHASE 5: VERIFY PUBLISH
# =============================================================================

  verify-testpypi:
    name: Verify TestPyPI
    runs-on: ubuntu-latest
    needs: [publish-testpypi, build-release]
    if: github.event_name == 'pull_request'
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Wait for index propagation
        run: sleep 60

      - name: Install from TestPyPI and verify
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          for i in 1 2 3; do
            echo "Attempt $i..."
            if pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "${{ env.PACKAGE_NAME }}==${{ needs.build-release.outputs.version }}"; then
              break
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'installed from TestPyPI')"

  verify-pypi:
    name: Verify PyPI
    runs-on: ubuntu-latest
    needs: [publish-pypi, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Wait for index propagation
        run: sleep 60

      - name: Install from PyPI and verify
        run: |
          python -m venv .verify_env
          source .verify_env/bin/activate
          for i in 1 2 3; do
            echo "Attempt $i..."
            if pip install "${{ env.PACKAGE_NAME }}==${{ needs.build-release.outputs.version }}"; then
              break
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
          tapestry-check --help
          python -c "import pirn; print('pirn', pirn.__version__, 'installed from PyPI')"

# =============================================================================
# SUMMARY
# =============================================================================

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, mock-integration-tests, smoke-tests, end-to-end-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: test-results
          pattern: test-results-*

      - name: Summarize
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in test-results/**/*.xml; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .xml)
            tests=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1 || echo "0")
            failures=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1 || echo "0")
            errors=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1 || echo "0")
            if [ "$failures" = "0" ] && [ "$errors" = "0" ]; then
              echo "- ✅ $name: $tests passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $name: $tests tests, $failures failures, $errors errors" >> $GITHUB_STEP_SUMMARY
            fi
          done
