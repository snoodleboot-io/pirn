name: Workspace (independent packages)  # SCD-24..27, standalone

# Per-package CI for SEVEN independent libraries (no uv workspace, no shared root
# config — only .github/ and scripts/ are shared). Resolution is wheelhouse-based:
# a `build-wheelhouse` job builds every package's wheel, and each downstream job
# installs its package (and its cross-package deps) from that wheelhouse with
# `--find-links`. Each package carries its own pyproject tooling + conftest.
#
#   * change-detection is dependency-aware (closure) AND purely dependency-driven:
#     a package runs when its own files change, an upstream pirn dep changes
#     (core → all; data → ml), or shared CI tooling (.github/ or scripts/) changes.
#   * lint/type/test fan out over ONLY the affected packages.
#   * one unified cross-domain suite proves registry parity with all packages
#     installed.
#
# Runs on every PR to main (change-detection fans out to only the affected
# packages) and on push to main (full matrix). Per-package images are built by
# build-ci-image.yml (main push on dep/Dockerfile change + weekly).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  ALL_PACKAGES: '["pirn-core","pirn-signal","pirn-data","pirn-ml","pirn-agents","pirn-health","pirn-oilgas"]'

# The container images are debian-slim where GitHub's default container shell is
# `sh` (dash); force bash so shell substitutions like ${p/pirn-/pirn_} and
# `set -o pipefail` work consistently across all jobs.
defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # Dependency-aware change detection. Declared edges: domains → core; ml → data.
  # A package is affected when (a) its own packages/pirn-<x>/ tree changed,
  # (b) an upstream pirn dep is affected (core → all; data → ml), or (c) shared
  # CI tooling changed — now ONLY `.github/` or `scripts/` (no shared root config
  # exists anymore). Output `packages` is the JSON array the matrices consume.
  # ===========================================================================
  changes:
    name: Detect affected packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.compute.outputs.packages }}
      any: ${{ steps.compute.outputs.any }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Compute affected package set (dependency closure)
        id: compute
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
            changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
                       || git diff --name-only HEAD~1...HEAD || echo '')"
          else
            changed=""
          fi
          echo "changed files:"; printf '%s\n' "$changed"

          # Only shared CI tooling forces the whole fleet (no shared root config).
          shared='^(\.github/|scripts/)'
          all=false
          if [ -z "$changed" ] || printf '%s\n' "$changed" | grep -qE "$shared"; then all=true; fi

          raw () { [ "$all" = true ] && { echo true; return; }; \
                   printf '%s\n' "$changed" | grep -qE "^packages/pirn-$1/" && echo true || echo false; }
          r_core=$(raw core); r_signal=$(raw signal); r_data=$(raw data)
          r_ml=$(raw ml); r_agents=$(raw agents); r_health=$(raw health); r_oilgas=$(raw oilgas)

          on () { case "true" in "$1"|"$2"|"$3") echo true;; *) echo false;; esac; }
          a_core=$r_core
          a_signal=$(on "$r_signal" "$a_core" false)
          a_data=$(on "$r_data" "$a_core" false)
          a_agents=$(on "$r_agents" "$a_core" false)
          a_health=$(on "$r_health" "$a_core" false)
          a_oilgas=$(on "$r_oilgas" "$a_core" false)
          a_ml=$(on "$r_ml" "$a_core" "$a_data")     # ml -> core, data

          pkgs=()
          [ "$a_core"   = true ] && pkgs+=('"pirn-core"')
          [ "$a_signal" = true ] && pkgs+=('"pirn-signal"')
          [ "$a_data"   = true ] && pkgs+=('"pirn-data"')
          [ "$a_ml"     = true ] && pkgs+=('"pirn-ml"')
          [ "$a_agents" = true ] && pkgs+=('"pirn-agents"')
          [ "$a_health" = true ] && pkgs+=('"pirn-health"')
          [ "$a_oilgas" = true ] && pkgs+=('"pirn-oilgas"')
          json="[$(IFS=,; echo "${pkgs[*]:-}")]"
          echo "affected: $json"
          echo "packages=$json" >> "$GITHUB_OUTPUT"
          [ "${#pkgs[@]}" -gt 0 ] && echo "any=true" >> "$GITHUB_OUTPUT" || echo "any=false" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Build every package's wheel into one wheelhouse artifact. Each package builds
  # standalone (`uv build <path>`) — no workspace. Downstream jobs install their
  # package + cross-package deps from this wheelhouse with `--find-links`.
  # ===========================================================================
  build-wheelhouse:
    name: Build wheelhouse (all packages)
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build all wheels
        run: |
          set -euo pipefail
          for p in $(echo '${{ env.ALL_PACKAGES }}' | tr -d '[]"' | tr ',' ' '); do
            uv build "packages/$p" -o dist/
          done
          ls -1 dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheelhouse
          path: dist/
          retention-days: 3

  # ===========================================================================
  # Lint + type-check the affected packages. Ruff is static; pyright runs with
  # reportMissingImports="none" per package, so neither needs heavy extras — just
  # the package installed from the wheelhouse (for pyright's own-symbol resolution).
  # ===========================================================================
  lint:
    name: Lint & Type Check (${{ matrix.package }})
    needs: [changes, build-wheelhouse]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    # Per-package image: that package's deps are pre-baked, so install is instant.
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-${{ matrix.package }}:py3.12
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0 (match upload-artifact v7; v8 digest-verify mismatched v7 uploads -> stale wheelhouse)
        with: { name: wheelhouse, path: dist/ }
      - name: Resolve import dir
        id: pkg
        run: |
          p='${{ matrix.package }}'
          if [ "$p" = "pirn-core" ]; then imp=pirn; else imp="${p/pirn-/pirn_}"; fi
          echo "imp=$imp" >> "$GITHUB_OUTPUT"
      - name: Install package editable (deps pre-baked) + ruff + pyright
        run: |
          set -euo pipefail
          uv pip install --system --find-links dist/ -e "packages/${{ matrix.package }}" ruff pyright
      - name: Ruff lint + format (package's own config)
        run: |
          ruff check --config packages/${{ matrix.package }}/pyproject.toml packages/${{ matrix.package }}/${{ steps.pkg.outputs.imp }}
          ruff format --check --config packages/${{ matrix.package }}/pyproject.toml packages/${{ matrix.package }}/${{ steps.pkg.outputs.imp }}
      - name: Pyright (package's own config)
        run: cd packages/${{ matrix.package }} && pyright

  # ===========================================================================
  # Per-package test matrix × Python 3.11–3.14. Editable-install the package with
  # its extras (heavy ML extras dropped for core) + cross-deps from the wheelhouse,
  # then run its own tests under its own config. `cross_domain` tests skip here.
  # ===========================================================================
  test:
    name: Test ${{ matrix.package }} (py${{ matrix.python-version }})
    needs: [changes, build-wheelhouse, lint]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    # Per-package image: deps + extras pre-baked, so install is near-instant.
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-${{ matrix.package }}:py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0 (match upload-artifact v7; v8 digest-verify mismatched v7 uploads -> stale wheelhouse)
        with: { name: wheelhouse, path: dist/ }
      - name: Compute install spec (extras minus heavy ML) + cross-dep refresh
        id: spec
        run: |
          set -euo pipefail
          p='${{ matrix.package }}'
          if [ "$p" = "pirn-core" ]; then imp=pirn; else imp="${p/pirn-/pirn_}"; fi
          echo "imp=$imp" >> "$GITHUB_OUTPUT"
          extras=$(python3 -c "import tomllib;d=tomllib.load(open('packages/${{ matrix.package }}/pyproject.toml','rb'));e=list(d.get('project',{}).get('optional-dependencies',{}));h={'pytorch','tensorflow','tflite'};print(','.join(x for x in e if x not in h))")
          if [ -n "$extras" ]; then echo "spec=packages/${{ matrix.package }}[$extras]" >> "$GITHUB_OUTPUT";
          else echo "spec=packages/${{ matrix.package }}" >> "$GITHUB_OUTPUT"; fi
          # Force-refresh cross-package deps so current code (not the baked wheel) is tested.
          case "${{ matrix.package }}" in
            pirn-core) xr="" ;;
            pirn-ml)   xr="--reinstall-package pirn-core --reinstall-package pirn-data" ;;
            *)         xr="--reinstall-package pirn-core" ;;
          esac
          echo "xr=$xr" >> "$GITHUB_OUTPUT"
          # Core connector extras some domain test suites exercise (the per-package
          # image bakes only that domain's own extras, not core's).
          case "${{ matrix.package }}" in
            pirn-data)   cte="pirn-core[sqlite]" ;;
            pirn-agents) cte="pirn-core[http]" ;;
            *)           cte="" ;;
          esac
          echo "cte=$cte" >> "$GITHUB_OUTPUT"
      - name: Install editable (deps pre-baked) + refresh cross-deps + test tooling
        run: |
          set -euo pipefail
          uv pip install --system --find-links dist/ ${{ steps.spec.outputs.xr }} \
            -e "${{ steps.spec.outputs.spec }}" ${{ steps.spec.outputs.cte }} \
            pytest pytest-asyncio pytest-cov pytest-timeout anyio
      - name: Run tests (own config) + per-package coverage
        run: |
          cd packages/${{ matrix.package }}
          python -m pytest tests --timeout=60 -q \
            --cov=${{ steps.spec.outputs.imp }} --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: packages/${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.package }}
          name: ${{ matrix.package }}
          fail_ci_if_error: false

  # ===========================================================================
  # Clean-env install-isolation (SCD-25). Install ONLY the package's wheel from
  # the wheelhouse and assert the resolved pirn-* tree equals the declared closure.
  # ===========================================================================
  install-isolation:
    name: Install isolation (${{ matrix.package }})
    needs: [changes, build-wheelhouse]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0 (match upload-artifact v7; v8 digest-verify mismatched v7 uploads -> stale wheelhouse)
        with: { name: wheelhouse, path: dist/ }
      - name: Clean-env install + dependency-tree closure gate
        run: |
          set -euo pipefail
          uv venv /tmp/iso
          uv pip install --python /tmp/iso/bin/python --find-links dist/ "${{ matrix.package }}"
          /tmp/iso/bin/python scripts/check_install_isolation.py --package "${{ matrix.package }}"

  # ===========================================================================
  # Per-extra clean-venv install+import (PIR-137). For each pirn-agents extra
  # bundle, create a CLEAN venv, install ONLY `pirn-agents[<extra>]` from the
  # wheelhouse, then import the package and confirm the extra's backends are now
  # available. Complements `install-isolation` (which proves the BASE install
  # stays backend-free) by proving each extra actually pulls its backends in.
  # ===========================================================================
  agents-extras-install:
    name: Install extras (pirn-agents [${{ matrix.extra }}])
    needs: [changes, build-wheelhouse]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    strategy:
      fail-fast: false
      matrix:
        extra: [llm, vector, web, mcp, all]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0 (match upload-artifact v7; v8 digest-verify mismatched v7 uploads -> stale wheelhouse)
        with: { name: wheelhouse, path: dist/ }
      - name: Clean-env install of pirn-agents[${{ matrix.extra }}] + import probe
        run: |
          set -euo pipefail
          uv venv /tmp/extra
          # Install pirn-agents from the SOURCE tree (not by name) so this PR's
          # code + extras are exercised: installing `pirn-agents[<extra>]` by name
          # can resolve to an already-published same-version wheel on PyPI that
          # lacks the extra. pirn-core comes from the wheelhouse; backends from PyPI.
          uv pip install --python /tmp/extra/bin/python --find-links dist/ \
            "packages/pirn-agents[${{ matrix.extra }}]"
          /tmp/extra/bin/python -c "import pirn_agents; print(pirn_agents.available_extras())"

  # ===========================================================================
  # Unified cross-domain suite (SCD-24 AC#3): install every package from the
  # wheelhouse, run the `cross_domain` registry-parity / shim / extras-isolation
  # tests under core's config.
  # ===========================================================================
  unified:
    name: Unified cross-domain suite (registry parity)
    needs: [changes, build-wheelhouse]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0 (match upload-artifact v7; v8 digest-verify mismatched v7 uploads -> stale wheelhouse)
        with: { name: wheelhouse, path: dist/ }
      - name: Install all packages (from wheelhouse) + test tooling
        run: |
          set -euo pipefail
          uv venv .venv
          uv pip install --find-links dist/ \
            pirn-core pirn-signal pirn-data pirn-ml pirn-agents pirn-health pirn-oilgas \
            pytest pytest-asyncio pytest-timeout anyio
      - name: Cross-domain registry-parity / shim / extras-isolation
        run: |
          uv run --no-sync python -m pytest packages/pirn-core/tests \
            -c packages/pirn-core/pyproject.toml --rootdir packages/pirn-core \
            -m "cross_domain and not slow and not heavy" -q

  # ===========================================================================
  # Import-graph gate (C1 acyclic · C2 sink · C3 sole edge · no-backend). Static.
  # ===========================================================================
  import-graph:
    name: Import-graph gate
    needs: [changes, build-wheelhouse]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0 (match upload-artifact v7; v8 digest-verify mismatched v7 uploads -> stale wheelhouse)
        with: { name: wheelhouse, path: dist/ }
      - name: Install bare pirn-core (from wheelhouse)
        run: |
          uv venv .venv
          uv pip install --find-links dist/ pirn-core
      - name: Core is a sink, no backend at import, package DAG acyclic
        run: uv run --no-sync python scripts/check_import_graph.py

  # ===========================================================================
  # Lockstep / C4 version gate (SCD-27). Pure stdlib over the package pyprojects.
  # ===========================================================================
  version-lockstep:
    name: Lockstep + C4 version gate
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: All packages lockstep-versioned; pins floored + capped (C4)
        run: python scripts/stamp_workspace_version.py --check

  # ===========================================================================
  # Single aggregator gate — the one stable, required status check for branch
  # protection (matrix job names are dynamic). Green only if every needed job
  # succeeded or was legitimately skipped (change-detection found nothing).
  # ===========================================================================
  ci-status:
    name: CI status (all green)
    needs: [changes, build-wheelhouse, lint, test, install-isolation, agents-extras-install, unified, import-graph, version-lockstep]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::one or more CI jobs failed"
          exit 1
      - name: All green
        run: echo "all required jobs succeeded (or were skipped by change-detection)"
