name: Real Backend Tests

# CI/CD auto-triggers are FROZEN during the split-core-and-domains migration
# (#51). The whole pipeline gets rebuilt for the uv workspace — per-package
# gating + dependency-ordered release trains — once all domains are extracted.
# Until then every workflow is manual-only; re-enable triggers at the very end.
# See planning/current/split-core-and-domains/.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  UV_PYTHON_PREFERENCE: only-system

# Container images are debian-slim (default shell `sh`); force bash.
defaults:
  run:
    shell: bash

jobs:
  approve:
    name: Approve Real Backend Tests
    runs-on: ubuntu-latest
    environment: real-backends
    steps:
      - run: echo "Approved — starting real backend tests"

  real-backends:
    name: Real Backend Tests
    runs-on: ubuntu-latest
    needs: [approve]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pirn
          POSTGRES_PASSWORD: pirn
          POSTGRES_DB: pirn_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pirn"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30

      valkey:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30

      redpanda:
        image: apache/kafka:latest
        ports: ["9092:9092"]
        env:
          KAFKA_NODE_ID: "1"
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://redpanda:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
          KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20

    env:
      PIRN_TEST_POSTGRES_URL: postgresql://pirn:pirn@postgres:5432/pirn_test
      PIRN_TEST_VALKEY_URL: redis://valkey:6379/0
      PIRN_TEST_KAFKA_URL: redpanda:9092
      PIRN_TEST_S3_ENDPOINT: http://localhost:9000
      PIRN_TEST_S3_ACCESS_KEY: pirn
      PIRN_TEST_S3_SECRET_KEY: pirntestpassword
      PIRN_TEST_S3_BUCKET: pirn-test
      PIRN_TEST_CELERY_BROKER: redis://valkey:6379/1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build wheelhouse + install core (+ all extras)
        run: |
          set -euo pipefail
          for p in pirn-core pirn-data; do uv build "packages/$p" -o dist/; done
          extras=$(python3 -c "import tomllib;d=tomllib.load(open('packages/pirn-core/pyproject.toml','rb'));print(','.join(k for k in d.get('project',{}).get('optional-dependencies',{}) if k not in {'pytorch','tensorflow','tflite'}))")
          uv venv .venv
          uv pip install --find-links dist/ -e "packages/pirn-core[$extras]" pytest pytest-timeout anyio

      - name: Start MinIO
        run: |
          curl -fsSL https://dl.min.io/server/minio/release/linux-amd64/minio -o /tmp/minio
          chmod +x /tmp/minio
          mkdir -p /tmp/minio-data
          MINIO_ROOT_USER=pirn MINIO_ROOT_PASSWORD=pirntestpassword /tmp/minio server /tmp/minio-data &
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - name: Create MinIO bucket
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://localhost:9000 pirn pirntestpassword
          /tmp/mc mb local/pirn-test || true

      - name: Run real-backend tests
        run: |
          mkdir -p test-results
          uv run --no-sync python -m pytest packages/pirn-core/tests/integration \
            -c packages/pirn-core/pyproject.toml --rootdir packages/pirn-core \
            --real \
            -m "needs_postgres or needs_valkey or needs_kafka or needs_s3 or needs_celery" \
            --junitxml=test-results/real-backends.xml \
            --timeout=120 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-real-backends
          path: test-results/real-backends.xml
          retention-days: 30
