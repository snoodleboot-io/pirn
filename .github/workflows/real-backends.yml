name: Real Backend Tests

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  UV_PROJECT_ENVIRONMENT: /opt/pirn-deps/.venv
  UV_PYTHON_PREFERENCE: only-system
  UV_FROZEN: "1"

jobs:
  approve:
    name: Approve Real Backend Tests
    runs-on: ubuntu-latest
    environment: real-backends
    steps:
      - run: echo "Approved — starting real backend tests"

  real-backends:
    name: Real Backend Tests
    runs-on: ubuntu-latest
    needs: [approve]
    container:
      image: ghcr.io/${{ github.repository_owner }}/pirn-ci-base:py3.12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pirn
          POSTGRES_PASSWORD: pirn
          POSTGRES_DB: pirn_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pirn"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30

      valkey:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30

      redpanda:
        image: redpandadata/redpanda:latest
        ports: ["9092:9092"]
        options: >-
          --health-cmd "rpk cluster info"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30

    env:
      PIRN_TEST_POSTGRES_URL: postgresql://pirn:pirn@postgres:5432/pirn_test
      PIRN_TEST_VALKEY_URL: redis://valkey:6379/0
      PIRN_TEST_KAFKA_URL: redpanda:9092
      PIRN_TEST_S3_ENDPOINT: http://localhost:9000
      PIRN_TEST_S3_ACCESS_KEY: pirn
      PIRN_TEST_S3_SECRET_KEY: pirntestpassword
      PIRN_TEST_S3_BUCKET: pirn-test
      PIRN_TEST_CELERY_BROKER: redis://valkey:6379/1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pirn
        run: uv sync --all-extras

      - name: Enable Redpanda auto-create topics
        run: |
          curl -sf -X PUT http://redpanda:9644/v1/cluster/config \
            -H "Content-Type: application/json" \
            -d '{"auto_create_topics_enabled": true}'

      - name: Start MinIO
        run: |
          curl -fsSL https://dl.min.io/server/minio/release/linux-amd64/minio -o /tmp/minio
          chmod +x /tmp/minio
          mkdir -p /tmp/minio-data
          MINIO_ROOT_USER=pirn MINIO_ROOT_PASSWORD=pirntestpassword /tmp/minio server /tmp/minio-data &
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - name: Create MinIO bucket
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://localhost:9000 pirn pirntestpassword
          /tmp/mc mb local/pirn-test || true

      - name: Run real-backend tests
        run: |
          uv run python -m pytest tests/integration \
            --real \
            -m "needs_postgres or needs_valkey or needs_kafka or needs_s3 or needs_celery" \
            --junitxml=test-results/real-backends.xml \
            --timeout=120 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: test-results-real-backends
          path: test-results/real-backends.xml
          retention-days: 30
