name: Real Backend Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-backends:
    name: Real Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pirn
          POSTGRES_PASSWORD: pirn
          POSTGRES_DB: pirn_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pirn"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30

      valkey:
        image: valkey/valkey:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30


    env:
      PIRN_TEST_POSTGRES_URL: postgresql://pirn:pirn@localhost:5432/pirn_test
      PIRN_TEST_VALKEY_URL: redis://localhost:6379/0
      PIRN_TEST_KAFKA_URL: localhost:9092
      PIRN_TEST_S3_ENDPOINT: http://localhost:9000
      PIRN_TEST_S3_ACCESS_KEY: pirn
      PIRN_TEST_S3_SECRET_KEY: pirntestpassword
      PIRN_TEST_S3_BUCKET: pirn-test
      # Celery uses ValKey as its broker on db 1 (db 0 is used by ValKey tests)
      PIRN_TEST_CELERY_BROKER: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      # MinIO and Redpanda run via docker run — service containers don't
      # support custom startup commands that these images require.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=pirn \
            -e MINIO_ROOT_PASSWORD=pirntestpassword \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Start Redpanda
        run: |
          docker run -d --name redpanda \
            -p 9092:9092 \
            redpandadata/redpanda:latest redpanda start \
              --overprovisioned \
              --smp=1 \
              --memory=512M \
              --reserve-memory=0M \
              --check=false \
              --node-id=0 \
              --kafka-addr=PLAINTEXT://0.0.0.0:9092 \
              --advertise-kafka-addr=PLAINTEXT://localhost:9092
          for i in $(seq 1 30); do
            docker exec redpanda rpk cluster info > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Create MinIO bucket
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://localhost:9000 pirn pirntestpassword
          /tmp/mc mb local/pirn-test || true

      - name: Run real-backend tests
        run: |
          uv run python -m pytest tests/integration \
            --real \
            -m "needs_postgres or needs_valkey or needs_kafka or needs_s3 or needs_celery" \
            --junitxml=test-results/real-backends.xml \
            --timeout=120 \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-real-backends
          path: test-results/real-backends.xml
          retention-days: 30
