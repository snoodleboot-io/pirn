repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^pirn/
      - id: ruff-format
        files: ^pirn/

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: .venv/bin/pyright
        language: system
        types: [python]
        pass_filenames: false
        files: ^pirn/

      - id: no-caps-constants
        name: no UPPER_SNAKE constants
        entry: python scripts/check_no_caps_constants.py
        language: system
        types: [python]
        files: ^pirn/
