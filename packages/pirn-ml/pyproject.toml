# Skeleton only (Phase 0 / SCD-02). NO source yet — `pirn/domains/ml` moves to
# `src/pirn_ml/` during extraction (Phase 3 / R5), at which point the ML extras
# (numpy/pandas/scikit-learn + ML-artefact codec extras) are lifted here from
# the root pyproject. This package carries the one retained domain→domain edge
# (`pirn-ml → pirn-data`, ADR-3) in addition to the core floor.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-ml"
version = "0.4.0"                          # lockstep (ADR-6)
description = "pirn machine-learning domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "pirn-core>=0.4.0,<0.5.0",             # lockstep floor (ADR-6 / constraint C4)
    "pirn-data>=0.4.0,<0.5.0",             # retained domain edge (ADR-3)
]

[tool.hatch.build.targets.wheel]
packages = ["src/pirn_ml"]

[tool.pyright]
extends = "../../pyright.base.json"        # shared relaxation rules (SCD-03)
include = ["src/pirn_ml"]
