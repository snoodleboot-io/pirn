# Skeleton only (Phase 0 / SCD-02). NO source yet — `pirn/domains/agents`
# moves to `src/pirn_agents/` during extraction (Phase 3 / R5). The `agents`
# extra is empty by design (LLM/memory/tool providers are user-supplied); the
# `agents→ml` edge is broken in Phase 2 (ADR-3), so this depends on core only.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-agents"
version = "0.4.0"                          # lockstep (ADR-6)
description = "pirn agents domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.4.0,<0.5.0"]  # lockstep floor (ADR-6 / constraint C4)

[tool.hatch.build.targets.wheel]
packages = ["src/pirn_agents"]

[tool.pyright]
extends = "../../pyright.base.json"        # shared relaxation rules (SCD-03)
include = ["src/pirn_agents"]
