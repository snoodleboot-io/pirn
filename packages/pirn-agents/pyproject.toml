# Skeleton only (Phase 0 / SCD-02). NO source yet — `pirn/domains/agents`
# moves to `pirn_agents/` during extraction (Phase 3 / R5). The `agents`
# extra is empty by design (LLM/memory/tool providers are user-supplied); the
# `agents→ml` edge is broken in Phase 2 (ADR-3), so this depends on core only.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-agents"
version = "0.9.0"                          # lockstep (ADR-6)
description = "pirn agents domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.9.0,<0.10.0"]  # lockstep floor (ADR-6 / constraint C4)

# --- extras matrix (OD-4): backends are lazily imported, so the base install
# stays pirn-core-only (small wheel) and users add only what they use. Extras
# are provider-neutral: per-provider entries are ILLUSTRATIVE, listed as equal
# siblings, and no vendor is privileged. Bundles group extras by capability.
[project.optional-dependencies]
# per-provider (illustrative, equal siblings — none privileged)
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.40"]
qdrant = ["qdrant-client>=1.7"]
pgvector = ["asyncpg>=0.29", "pgvector>=0.2"]
chroma = ["chromadb>=0.4"]
# local ML capabilities (illustrative, equal siblings — none privileged)
local-embed = ["sentence-transformers>=2.2"]
cross-encoder = ["sentence-transformers>=2.2"]
# observability backend for the F10 OTel-style span sink (lazily imported)
otel = ["opentelemetry-api>=1.20"]
# capability bundles — flat concrete deps (no self-referential `pirn-agents[...]`
# composition: a self-reference can re-resolve to an already-published wheel of the
# same version from PyPI that lacks the extra, so bundles list packages directly)
llm = ["openai>=1.0", "anthropic>=0.40"]
vector = ["qdrant-client>=1.7", "asyncpg>=0.29", "pgvector>=0.2", "chromadb>=0.4"]
web = ["httpx>=0.27"]
mcp = ["mcp>=1.0"]
# async SQL driver for the base sql_query tool (stdlib sqlite is the zero-extra default)
sql = ["aiosqlite>=0.19"]
# async Postgres driver for the F16-S2 SQL service connector (lazily imported)
postgres = ["asyncpg>=0.29"]
# S3-compatible object storage backend for the F16-S4 blob connector (lazily imported)
s3 = ["aioboto3>=12.0"]
# grammar/regex-constrained decoding backend (F20-S3, lazily imported)
grammar = ["outlines>=0.1"]
all = [
    "openai>=1.0",
    "anthropic>=0.40",
    "qdrant-client>=1.7",
    "asyncpg>=0.29",
    "pgvector>=0.2",
    "chromadb>=0.4",
    "sentence-transformers>=2.2",
    "httpx>=0.27",
    "mcp>=1.0",
    "aiosqlite>=0.19",
    "aioboto3>=12.0",
    "opentelemetry-api>=1.20",
    "outlines>=0.1",
]

[tool.hatch.build.targets.wheel]
packages = ["pirn_agents"]

# --- standalone tooling: pirn-agents owns its full config (no shared root) ---

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "anyio>=4.0",
    "ruff>=0.15.17",
    "pyright>=1.1.410",
    "mutmut>=3.6.0,<4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--strict-markers -ra -m 'not slow and not mutation and not heavy'"
markers = [
    "slow: tests that take meaningful wall-clock time",
    "mutation: mutation-test-specific assertions",
    "heavy: requires large ML deps (torch, tensorflow) — excluded from the default suite",
    "cross_domain: needs >1 package installed — skipped in isolation, run by the unified suite",
    "anyio: async test driven by the anyio pytest plugin (registered so --strict-markers passes if absent)",
    "needs_postgres: requires a real Postgres at $PIRN_TEST_POSTGRES_URL",
    "needs_pgvector: requires a real pgvector-enabled Postgres at $PIRN_TEST_PGVECTOR_URL",
    "needs_qdrant: requires a real Qdrant at $PIRN_TEST_QDRANT_URL",
    "needs_chroma: requires a real Chroma (chromadb installed / running)",
    "needs_valkey: requires a real ValKey at $PIRN_TEST_VALKEY_URL",
    "needs_kafka: requires a real Kafka at $PIRN_TEST_KAFKA_URL",
    "needs_s3: requires a real S3 (or compatible) endpoint",
    "needs_dask: requires dask.distributed (uses LocalCluster)",
    "needs_ray: requires ray (uses a local Ray instance)",
    "needs_celery: requires celery + Redis broker at $PIRN_TEST_CELERY_BROKER",
    "benchmark: pytest-benchmark performance test",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["F841"]

[tool.coverage.run]
source = ["pirn_agents"]

[tool.mutmut]
paths_to_mutate = "pirn_agents/"
tests_dir = "tests/"
runner = ".venv/bin/python -m pytest tests -x -q --no-header"

[tool.pyright]
include = ["pirn_agents"]
pythonVersion = "3.12"
reportMissingImports = "none"
reportMissingModuleSource = "none"
reportIncompatibleMethodOverride = "none"
reportAttributeAccessIssue = "none"
