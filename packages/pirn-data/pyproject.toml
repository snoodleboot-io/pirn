# pirn-data — the Data Engineering / Analytics domain, imports as `pirn_data`
# (SCD-13, Phase 3). Source relocated from `pirn/domains/data` to
# `pirn_data/`; the data-domain extras (the `data` base + the tiered
# frame engines, lakehouse formats, validation frameworks, and the
# all-frames/all-lazy aggregates) moved here from pirn-core. `arrow`/`parquet`
# (pyarrow, connector-shared) and `dask` (core dispatcher) stay in pirn-core.
# Depends only on pirn-core.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-data"
version = "0.9.0"                          # lockstep (ADR-6)
description = "pirn data domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.9.0,<0.10.0"]  # lockstep floor (ADR-6 / constraint C4)

[project.optional-dependencies]
# Tier 1 — DataBatch / dict-based; the domain's foundational extra.
data = ["pandas>=2.0", "pyarrow>=14.0"]

# Tier 0 — specialized columnar layouts.
xarray  = ["xarray>=2024.0"]
awkward = ["awkward>=2.5"]

# Tier 2 — single-machine native frames (CPU).
polars     = ["polars>=0.20"]
datafusion = ["datafusion>=40.0"]

# Tier 2.5 — out-of-core / drop-in distributed (pinned <3.14 until wheels land).
modin = ["modin>=0.30; python_version<'3.14'"]

# Tier 3 — push-down / lazy / distributed.
ibis     = ["ibis-framework>=9.0", "pyarrow-hotfix>=0.7"]
spark    = ["pyspark>=4.0"]
ray-data = ["ray[data]>=2.10"]

# Tier 3 — streaming dataflow (pinned until upstream ships newer wheels).
pathway = ["pathway>=0.13; python_version<'3.11'"]
bytewax = ["bytewax>=0.21; python_version<'3.13'"]

# Tier 4 — specialized.
lance = ["lance>=1.0"]
eland = ["eland>=8.13"]

# Lakehouse table formats — see pirn_data/lakehouse/. Hudi's Python ecosystem
# is read-only as of mid-2026; the no-op `hudi` marker reads via pyarrow.
delta   = ["deltalake>=0.17"]
iceberg = ["pyiceberg>=0.6"]
hudi    = []

# Validation frameworks (cross-tier; integrate with quality knots).
pandera            = ["pandera>=0.20"]
great-expectations = ["great-expectations>=0.18"]

# Convenience aggregate — every Tier-2 single-machine CPU frame engine.
all-frames = [
    "polars>=0.20",
    "pandas>=2.0",
    "pyarrow>=14.0",
    "duckdb>=0.10",
    "datafusion>=40.0",
]

# Convenience aggregate — the lazy/push-down tier.
all-lazy = [
    "ibis-framework>=9.0",
    "pyspark>=4.0",
    "ray[data]>=2.10",
    "dask[distributed]>=2024.1",
]

[tool.hatch.build.targets.wheel]
packages = ["pirn_data"]

# --- standalone tooling: pirn-data owns its full config (no shared root) ---

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "anyio>=4.0",
    "ruff>=0.15.17",
    "pyright>=1.1.410",
    "mutmut>=3.6.0,<4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--strict-markers -ra -m 'not slow and not mutation and not heavy'"
markers = [
    "slow: tests that take meaningful wall-clock time",
    "mutation: mutation-test-specific assertions",
    "heavy: requires large ML deps (torch, tensorflow) — excluded from the default suite",
    "cross_domain: needs >1 package installed — skipped in isolation, run by the unified suite",
    "anyio: async test driven by the anyio pytest plugin (registered so --strict-markers passes if absent)",
    "needs_postgres: requires a real Postgres at $PIRN_TEST_POSTGRES_URL",
    "needs_valkey: requires a real ValKey at $PIRN_TEST_VALKEY_URL",
    "needs_kafka: requires a real Kafka at $PIRN_TEST_KAFKA_URL",
    "needs_s3: requires a real S3 (or compatible) endpoint",
    "needs_dask: requires dask.distributed (uses LocalCluster)",
    "needs_ray: requires ray (uses a local Ray instance)",
    "needs_celery: requires celery + Redis broker at $PIRN_TEST_CELERY_BROKER",
    "benchmark: pytest-benchmark performance test",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["F841"]

[tool.coverage.run]
source = ["pirn_data"]

[tool.mutmut]
paths_to_mutate = "pirn_data/"
tests_dir = "tests/"
runner = ".venv/bin/python -m pytest tests -x -q --no-header"

[tool.pyright]
include = ["pirn_data"]
pythonVersion = "3.12"
reportMissingImports = "none"
reportMissingModuleSource = "none"
reportIncompatibleMethodOverride = "none"
reportAttributeAccessIssue = "none"
