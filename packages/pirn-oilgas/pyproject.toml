# pirn-oilgas — the Oil & Gas domain, imports as `pirn_oilgas` (SCD-12,
# Phase 3). Source relocated from `pirn/domains/oilgas` to `pirn_oilgas/`;
# the domain's heavy-dep extras (segyio/lasio/resfo) moved here from pirn-core.
# Depends only on pirn-core.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-oilgas"
version = "0.4.0"                          # lockstep (ADR-6)
description = "pirn oil & gas domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.4.0,<0.5.0"]  # lockstep floor (ADR-6 / constraint C4)

[project.optional-dependencies]
# Heavy oil & gas SDKs — the orchestration layer imports without these;
# concrete knots check via pirn_oilgas.extras_loader.ExtrasLoader.
oilgas = ["segyio>=1.9.14", "lasio>=0.32", "resfo>=1.3"]

[tool.hatch.build.targets.wheel]
packages = ["pirn_oilgas"]

# --- standalone tooling: pirn-oilgas owns its full config (no shared root) ---

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "anyio>=4.0",
    "ruff>=0.15.17",
    "pyright>=1.1.410",
    "mutmut>=3.6.0,<4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--strict-markers -ra -m 'not slow and not mutation and not heavy'"
markers = [
    "slow: tests that take meaningful wall-clock time",
    "mutation: mutation-test-specific assertions",
    "heavy: requires large ML deps (torch, tensorflow) — excluded from the default suite",
    "cross_domain: needs >1 package installed — skipped in isolation, run by the unified suite",
    "anyio: async test driven by the anyio pytest plugin (registered so --strict-markers passes if absent)",
    "needs_postgres: requires a real Postgres at $PIRN_TEST_POSTGRES_URL",
    "needs_valkey: requires a real ValKey at $PIRN_TEST_VALKEY_URL",
    "needs_kafka: requires a real Kafka at $PIRN_TEST_KAFKA_URL",
    "needs_s3: requires a real S3 (or compatible) endpoint",
    "needs_dask: requires dask.distributed (uses LocalCluster)",
    "needs_ray: requires ray (uses a local Ray instance)",
    "needs_celery: requires celery + Redis broker at $PIRN_TEST_CELERY_BROKER",
    "benchmark: pytest-benchmark performance test",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["F841"]

[tool.coverage.run]
source = ["pirn_oilgas"]

[tool.mutmut]
paths_to_mutate = "pirn_oilgas/"
tests_dir = "tests/"
runner = ".venv/bin/python -m pytest tests -x -q --no-header"

[tool.pyright]
include = ["pirn_oilgas"]
pythonVersion = "3.12"
reportMissingImports = "none"
reportMissingModuleSource = "none"
reportIncompatibleMethodOverride = "none"
reportAttributeAccessIssue = "none"
