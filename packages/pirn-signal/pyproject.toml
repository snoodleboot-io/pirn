# Skeleton only (Phase 0 / SCD-02). NO source yet — `pirn/domains/signal`
# moves to `src/pirn_signal/` during extraction (Phase 3 / R5), at which point
# the domain's heavy-dep extras (scipy/pywavelets/librosa/emd) are lifted here
# from the root pyproject. Until then this declares only the intra-workspace
# dependency so `uv lock` can resolve the graph.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-signal"
version = "0.4.0"                          # lockstep (ADR-6)
description = "pirn signal-processing domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.4.0,<0.5.0"]  # lockstep floor (ADR-6 / constraint C4)

[tool.hatch.build.targets.wheel]
packages = ["src/pirn_signal"]

[tool.pyright]
extends = "../../pyright.base.json"        # shared relaxation rules (SCD-03)
include = ["src/pirn_signal"]
