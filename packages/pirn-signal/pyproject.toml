# pirn-signal — the Digital Signal Processing domain, imports as `pirn_signal`
# (SCD-11, Phase 3). Source relocated from `pirn/domains/signal` to
# `src/pirn_signal/`; the domain's heavy-dep extras (scipy/pywavelets/librosa
# for `signal`, EMD-signal/scipy for `emd`) moved here from pirn-core. Depends
# only on pirn-core.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-signal"
version = "0.4.0"                          # lockstep (ADR-6)
description = "pirn signal-processing domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.4.0,<0.5.0"]  # lockstep floor (ADR-6 / constraint C4)

[project.optional-dependencies]
# Heavy DSP backends — the pure-Python orchestration layer imports without
# these; concrete knots check via pirn_signal.extras_loader.ExtrasLoader.
signal = ["scipy>=1.12", "pywavelets>=1.5", "librosa>=0.10"]
emd    = ["EMD-signal>=1.6", "scipy>=1.12"]

[tool.hatch.build.targets.wheel]
packages = ["src/pirn_signal"]

[tool.pyright]
extends = "../../pyright.base.json"        # shared relaxation rules (SCD-03)
include = ["src/pirn_signal"]
