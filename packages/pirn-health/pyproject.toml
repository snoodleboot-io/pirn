# pirn-health — the health domain, imports as `pirn_health` (SCD-16, Phase 3).
# Source relocated from `pirn/domains/health` to `pirn_health/`; the
# domain's heavy-dep extras (pydicom/mne/nibabel/pyfaidx/pysam/fhir.resources/
# pyedflib for `health`, plus the `mri` and `genomics` subsets) moved here from
# pirn-core. The `health→agents` edge is broken in Phase 2 (ADR-3), so this
# depends only on pirn-core. `bids` (pybids) and `pyteomics`/`psims` stay in
# pirn-core — they are not health-domain-owned.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-health"
version = "0.9.0"                          # lockstep (ADR-6)
description = "pirn health domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.9.0,<0.10.0"]  # lockstep floor (ADR-6 / constraint C4)

[project.optional-dependencies]
# Heavy clinical/biomedical SDKs — the pure-Python orchestration layer imports
# without these; the stub knot `process()` bodies are replaced with vendor SDK
# calls once the extra is installed.
health  = [
    "pydicom>=2.4",
    "mne>=1.6",
    "nibabel>=5.2",
    "pyfaidx>=0.7",
    "pysam>=0.22",
    "fhir.resources>=7.1",
    "pyedflib>=0.1.42",
]
# MRI/volumetrics subset — resolves independently of the full `health` extra.
mri = [
    "SimpleITK>=2.3",
    "dipy>=1.9",
    "nibabel>=5.2",
]
# Genomics subset — file formats only (FASTA, FASTQ, VCF, BCF); resolves
# independently of the full `health` extra.
genomics = ["pyfaidx>=0.7", "pysam>=0.22"]

[tool.hatch.build.targets.wheel]
packages = ["pirn_health"]

# --- standalone tooling: pirn-health owns its full config (no shared root) ---

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "anyio>=4.0",
    "ruff>=0.15.17",
    "pyright>=1.1.410",
    "mutmut>=3.6.0,<4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--strict-markers -ra -m 'not slow and not mutation and not heavy'"
markers = [
    "slow: tests that take meaningful wall-clock time",
    "mutation: mutation-test-specific assertions",
    "heavy: requires large ML deps (torch, tensorflow) — excluded from the default suite",
    "cross_domain: needs >1 package installed — skipped in isolation, run by the unified suite",
    "anyio: async test driven by the anyio pytest plugin (registered so --strict-markers passes if absent)",
    "needs_postgres: requires a real Postgres at $PIRN_TEST_POSTGRES_URL",
    "needs_valkey: requires a real ValKey at $PIRN_TEST_VALKEY_URL",
    "needs_kafka: requires a real Kafka at $PIRN_TEST_KAFKA_URL",
    "needs_s3: requires a real S3 (or compatible) endpoint",
    "needs_dask: requires dask.distributed (uses LocalCluster)",
    "needs_ray: requires ray (uses a local Ray instance)",
    "needs_celery: requires celery + Redis broker at $PIRN_TEST_CELERY_BROKER",
    "benchmark: pytest-benchmark performance test",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["F841"]

[tool.coverage.run]
source = ["pirn_health"]

[tool.mutmut]
paths_to_mutate = "pirn_health/"
tests_dir = "tests/"
runner = ".venv/bin/python -m pytest tests -x -q --no-header"

[tool.pyright]
include = ["pirn_health"]
pythonVersion = "3.12"
reportMissingImports = "none"
reportMissingModuleSource = "none"
reportIncompatibleMethodOverride = "none"
reportAttributeAccessIssue = "none"
