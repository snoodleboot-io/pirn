# Skeleton only (Phase 0 / SCD-02). NO source yet — `pirn/domains/health`
# moves to `src/pirn_health/` during extraction (Phase 3 / R5), at which point
# the health extras (pydicom/mne/nibabel/... + mri/genomics/bids/pyteomics)
# are lifted here from the root pyproject. The `health→agents` edge is broken
# in Phase 2 (ADR-3), so this depends on core only.
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pirn-health"
version = "0.4.0"                          # lockstep (ADR-6)
description = "pirn health domain knots."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pirn-core>=0.4.0,<0.5.0"]  # lockstep floor (ADR-6 / constraint C4)

[tool.hatch.build.targets.wheel]
packages = ["src/pirn_health"]

[tool.pyright]
extends = "../../pyright.base.json"        # shared relaxation rules (SCD-03)
include = ["src/pirn_health"]
