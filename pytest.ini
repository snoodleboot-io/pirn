[pytest]
# Centralized test config for the whole workspace (SCD-03 / PACKAGING_MIGRATION
# §4). Tests stay in the root `tests/` tree (ADR open-q #6) and run against one
# synced env, so a single root config governs every package — markers and
# addopts are defined once here. Moved verbatim from the former
# [tool.pytest.ini_options] block so default-suite behavior is unchanged.
testpaths = tests
asyncio_mode = auto
# Default run excludes slow and mutation; opt in with -m slow / -m mutation.
addopts = --strict-markers -ra --ignore=tests/perf -m 'not slow and not mutation and not heavy'
markers =
    slow: tests that take meaningful wall-clock time
    mutation: mutation-test-specific assertions
    heavy: requires large ML deps (torch, tensorflow) — excluded from default suite, runs in heavy-tests CI job
    needs_postgres: requires a real Postgres at $PIRN_TEST_POSTGRES_URL
    needs_valkey: requires a real ValKey at $PIRN_TEST_VALKEY_URL
    needs_kafka: requires a real Kafka at $PIRN_TEST_KAFKA_URL
    needs_s3: requires a real S3 (or compatible) endpoint
    needs_dask: requires dask.distributed (no Docker needed; uses LocalCluster)
    needs_ray: requires ray (no Docker needed; uses local Ray instance)
    needs_celery: requires celery + Redis broker at $PIRN_TEST_CELERY_BROKER
    benchmark: pytest-benchmark performance test (run via tests/perf/)
